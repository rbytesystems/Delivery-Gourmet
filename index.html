<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery Gourmet</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <header class="main-header">
        <div class="container header-flex">
            <div class="logo">
                <h1>DELIVERY <span>GOURMET</span></h1>
            </div>
            <nav>
                <a href="#produtos">Cardápio</a>
                <a href="#checkout" class="cart-link">
                    <i class="fas fa-shopping-basket"></i>
                    <span id="cart-count">0</span>
                </a>
            </nav>
        </div>
    </header>

    <main>
        <!-- Banner Carrossel -->
        <section class="hero-carousel">
            <div class="carousel-container" id="carousel">
                <div class="slide">
                    <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=1200" alt="Hambúrguer Artesanal">
                    <div class="slide-content"><h2>O Melhor de Vespasiano</h2></div>
                </div>
                <div class="slide">
                    <img src="https://images.unsplash.com/photo-1573080496219-bb080dd4f877?w=1200" alt="Batatas Crocantes">
                    <div class="slide-content"><h2>Crocantes e Quentinhas</h2></div>
                </div>
            </div>
            <button class="c-prev" onclick="moveSlide(-1)">❮</button>
            <button class="c-next" onclick="moveSlide(1)">❯</button>
        </section>

        <!-- Grade de Produtos -->
        <section class="container section-padding" id="produtos">
            <h2 class="section-title">Nosso Cardápio</h2>
            <div class="products-grid" id="products-grid">
                <!-- Injetado via JS -->
            </div>
        </section>

        <!-- Finalização de Pedido -->
        <section class="container section-padding" id="checkout">
            <div class="checkout-wrapper">
                <div class="cart-summary">
                    <h3>Seu Pedido</h3>
                    <div id="cart-items-list" class="cart-items-list">
                        <p class="empty-msg">Seu carrinho está vazio...</p>
                    </div>
                    <div class="total-box">
                        <p>Subtotal: <span id="subtotal">R$ 0,00</span></p>
                        <p>Entrega: <span>R$ 5,00</span></p>
                        <hr>
                        <h4>Total: <span id="final-total">R$ 5,00</span></h4>
                    </div>
                </div>

                <div class="order-form-container">
                    <h3>Dados de Entrega</h3>
                    <form id="order-form" class="order-form">
                        <div class="input-group">
                            <label>Nome Completo</label>
                            <input type="text" id="c-name" placeholder="Como podemos te chamar?" required>
                        </div>
                        <div class="input-group">
                            <label>Endereço e Número</label>
                            <input type="text" id="c-address" placeholder="Rua, número e apto" required>
                        </div>
                        <div class="input-row">
                            <div class="input-group">
                                <label>Bairro</label>
                                <select id="c-bairro">
                                    <option>Dom Pedro I</option>
                                    <option>Cachoeira</option>
                                    <option>Lar de Minas</option>
                                    <option>Jardim Encantado</option>
                                </select>
                            </div>
                            <div class="input-group">
                                <label>Cidade</label>
                                <select id="c-city">
                                    <option>Vespasiano</option>
                                    <option>Confins</option>
                                    <option>São José da Lapa</option>
                                </select>
                            </div>
                        </div>
                        <div class="input-group">
                            <label>Forma de Pagamento</label>
                            <select id="c-payment">
                                <option>PIX</option>
                                <option>Cartão de Crédito</option>
                                <option>Dinheiro</option>
                            </select>
                        </div>
                        <button type="button" class="btn-whatsapp" onclick="checkoutWhatsApp()">
                            <i class="fab fa-whatsapp"></i> Finalizar Pedido no WhatsApp
                        </button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <footer class="main-footer">
        <p>&copy; 2026 UAITCHE Delivery. Todos os direitos reservados.</p>
        <p><small>Desenvolvido com carinho.</small></p>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
